name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.1'
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
              echo "keyAlias=${KEY_ALIAS:-upload}"
              echo "storeFile=upload-keystore.jks"
            } > android/key.properties
            echo "Release keystore configured."
          else
            echo "No release keystore secrets — APK will be signed with debug key."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/suflyor-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: suflyor-release-apk
          path: artifacts/suflyor-release.apk
          if-no-files-found: error
          retention-days: 90
