plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Подгружаем релизные параметры подписи из android/key.properties,
// если файл существует. Workflow в CI создаёт его, когда заданы
// секреты KEYSTORE_BASE64 / KEYSTORE_PASSWORD. Если файла нет —
// build buildType:release будет подписан debug-ключом (для CI-превью).
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.suflyor.suflyor"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.suflyor.suflyor"
        // speech_to_text и permission_handler требуют API >= 21.
        // Поднимаем до 23, чтобы повсеместно был доступен RECORD_AUDIO
        // runtime-permission flow без дополнительных костылей.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (keystoreProperties.containsKey('storeFile')) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = keystoreProperties.containsKey('storeFile')
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
