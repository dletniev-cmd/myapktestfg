name: github_pusher
description: "GitHub Pusher — заливай файлы, отслеживай Actions и скачивай APK прямо с телефона."
publish_to: 'none'
version: 1.9.3+66

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  archive: ^3.6.1
  file_picker: ^8.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  photo_manager: ^3.5.2
  flutter_local_notifications: ^17.2.1+2
  # Lottie — для анимированных стикеров на экране онбординга
  # (cloud / robot / bag / lock). .tgs Telegram-стикеры предварительно
  # распакованы в обычный Lottie JSON и лежат в assets/lottie/.
  # Lottie рендерится на GPU через `flutter`, без MethodChannel — то
  # есть не блокирует UI-тред и не лагает на свайпе PageView.
  lottie: ^3.1.2
  # crypto уже подтягивается транзитивно (http→...→crypto), фиксируем
  # как явную зависимость, потому что используем `sha1.convert(...)`
  # напрямую в api.pushFiles для расчёта git blob SHA локально и
  # сравнения с remote tree — это позволяет пушить только изменённые
  # или новые файлы, а не всё подряд.
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lottie/
