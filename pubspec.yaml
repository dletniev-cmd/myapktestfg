name: suflyor
description: "Суфлёр — мобильный телепромптер с автоматической прокруткой по голосу."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Распознавание речи через нативные движки Android/iOS — используется
  # для авто-прокрутки текста по позиции произнесённого слова. Плагин
  # активно поддерживается и работает поверх SpeechRecognizer на
  # Android и SFSpeechRecognizer на iOS.
  speech_to_text: ^7.0.0
  # Запросы разрешения на микрофон/распознавание речи. permission_handler
  # покрывает все нужные платформенные диалоги.
  permission_handler: ^11.3.1
  # Локальное хранение текстов и настроек (скорость, размер шрифта).
  shared_preferences: ^2.3.2
  # Альтернативный бэкенд распознавания: запись микрофона + Groq Whisper.
  # `record` даёт стрим PCM с микрофона, `http` — multipart POST на Groq.
  record: ^5.1.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
